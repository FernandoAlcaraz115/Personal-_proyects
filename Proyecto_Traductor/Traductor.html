<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeTranslate AI - Traductor de Código</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <nav class="navbar">
        <div class="navbar-inner">
            <div class="nav-brand">
                <div class="nav-logo-icon">&#60;/&#62;</div>
                <span class="nav-title">CodeTranslate AI</span>
            </div>
            <div class="nav-actions">
                <button id="history-btn" class="action-btn secondary nav-btn" style="display: none;">
                    📜 <span class="nav-btn-label" data-i18n="history">Historial</span>
                </button>
                <div class="lang-switcher">
                    <button class="lang-btn active" id="lang-es" onclick="setLanguage('es')">ES</button>
                    <span class="lang-divider">|</span>
                    <button class="lang-btn" id="lang-en" onclick="setLanguage('en')">EN</button>
                </div>
                <div id="user-display"></div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-hero">
            <h2 class="hero-title" data-i18n="heroTitle">Traductor de Código con IA</h2>
            <p class="hero-subtitle" data-i18n="heroSubtitle">Convierte código entre 7 lenguajes de programación al
                instante</p>
        </div>

        <main>
            <div class="translator-container">
                <div class="code-panel">
                    <div class="panel-header">
                        <div class="panel-title" data-i18n="sourcePanel">Código Fuente</div>
                        <div class="custom-select">
                            <select class="language-selector" id="source-language">
                                <option value="python">Python</option>
                                <option value="java">Java</option>
                                <option value="javascript">JavaScript</option>
                                <option value="cpp">C++</option>
                                <option value="csharp">C#</option>
                                <option value="php">PHP</option>
                                <option value="ruby">Ruby</option>
                            </select>
                            <div class="selected-icon" id="source-icon">🐍</div>
                        </div>
                    </div>
                    <textarea class="code-area" id="source-code" placeholder="Pega tu código aquí..."
                        data-i18n-placeholder="sourcePlaceholder">def saludar(nombre):
    print(f"Hola, {nombre}!")

saludar("Mundo")</textarea>
                    <div class="panel-footer">
                        <button class="action-btn secondary" id="clear-source"><span>🗑️</span> <span
                                data-i18n="clear">Limpiar</span></button>
                        <button class="action-btn secondary" id="paste-source"><span>📋</span> <span
                                data-i18n="paste">Pegar</span></button>
                    </div>
                </div>

                <div class="code-panel">
                    <div class="panel-header">
                        <div class="panel-title"><span data-i18n="targetPanel">Código Traducido</span> <span
                                class="ai-badge">AI</span></div>
                        <div class="custom-select">
                            <select class="language-selector" id="target-language">
                                <option value="java">Java</option>
                                <option value="python">Python</option>
                                <option value="javascript">JavaScript</option>
                                <option value="cpp">C++</option>
                                <option value="csharp">C#</option>
                                <option value="php">PHP</option>
                                <option value="ruby">Ruby</option>
                            </select>
                            <div class="selected-icon" id="target-icon">☕</div>
                        </div>
                    </div>
                    <textarea class="code-area" id="target-code" placeholder="El código traducido aparecerá aquí..."
                        data-i18n-placeholder="targetPlaceholder" readonly></textarea>
                    <div class="panel-footer">
                        <button class="action-btn secondary" id="clear-target"><span>🗑️</span> <span
                                data-i18n="clear">Limpiar</span></button>
                        <div style="display:flex; gap:8px;">
                            <button class="action-btn secondary" id="copy-target"><span>📄</span> <span
                                    data-i18n="copy">Copiar</span></button>
                            <button class="action-btn" id="download-target"><span>⬇️</span> <span
                                    data-i18n="download">Descargar</span></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="controls" style="flex-direction: column; align-items: center; gap: 15px;">
                <div class="settings-panel">
                    <div class="setting-item" style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; color: #94a3b8; font-size: 0.9rem;">🧠 <span
                                data-i18n="modelLabel">Modelo de Inteligencia Artificial:</span></label>
                        <select id="ai-model" class="model-selector">
                            <option value="llama-3.1-8b-instant">⚡ Llama 3.1 8B (Más Rápido)</option>
                            <option value="llama-3.3-70b-versatile">🧠 Llama 3.3 70B (Más Inteligente)</option>
                            <option value="mixtral-8x7b-32768">🌪️ Mixtral 8x7B (Equilibrado)</option>
                            <option value="gemma2-9b-it">💎 Google Gemma 2 9B (Alternativa)</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label class="toggle-switch">
                            <input type="checkbox" id="comments-toggle" checked>
                            <span class="toggle-label">📝 <span data-i18n="commentsToggle">Incluir comentarios
                                    explicativos</span></span>
                        </label>
                    </div>
                </div>

                <button type="button" class="translate-btn" id="translate-btn">
                    <span>🔄</span> <span data-i18n="translateBtn">Traducir Código</span>
                </button>
            </div>

            <div class="changes-panel" id="changes-panel">
                <div class="changes-header">
                    <h3>📋 <span data-i18n="changesTitle">Cambios Realizados</span></h3>
                    <button class="close-changes" id="close-changes">✕</button>
                </div>
                <div class="changes-content" id="changes-content"></div>
            </div>
        </main>

        <footer>
            <p>CodeTranslate AI - &copy; 2026</p>
        </footer>
    </div>

    <div id="history-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📜 <span data-i18n="historyTitle">Historial de Traducciones</span></h2>
                <button id="close-history" class="close-modal-btn">✕</button>
            </div>
            <div class="modal-body">
                <div id="history-list" class="history-list">
                    <p class="loading-text">Cargando historial...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/scripts.js"></script>
</body>

</html>
